<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissors</title>
    <script src="script.js" async></script>
</head>
<body>
    <div class="container">
        <h1>Rock Paper and Scissors game:</h1>
    <h4>Choose one of the options bellow:</h4>

        <button id="rock">Rock</button>
        <button id="paper">Paper</button>
        <button id="scissors">Scissors</button>

        <div>Human Score: <span id="humanScore"></span></div>
        <div>Computer Score: <span id="computerScore"></span></div>
    

        <div>The Winner is: <span id="result"></span></div>


    </div>
    


</body>
</html>
